name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pyproject.toml declares `requires-python = ">=3.11"`. The matrix
        # said 3.9 and 3.10, which the package does not claim to support and
        # which are both past end of life, so the lint ran against a language
        # version the code is never executed on.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      # v3 runs on the Node 16 runtime, which GitHub-hosted runners no longer
      # provide.
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint astroid
        pip install -r requirements.txt
    - name: Analysing the code with pylint
      run: |
        pylint_output=$(pylint $(git ls-files '*.py') --output-format=parseable | tee pylint.log)
        echo "$pylint_output"
        SCORE=$(echo "$pylint_output" | awk -F ' ' '/Your code has been rated at/ {print $7}' | cut -d'/' -f1)
        if (( $(echo "$SCORE >= 9.0" | bc -l) )); then
          echo "Pylint score ($SCORE) is acceptable."
          exit 0
        else
          echo "Pylint score ($SCORE) is too low."
          exit 1
        fi

  test:
    # The repo has a test suite and a `make test` target, but nothing ran it.
    # A lint score is not a build: the panel contract tests in
    # tests/test_panel.py are the thing that fails the build when a
    # control-plane route is registered under /api/, and that invariant is
    # only load-bearing if CI actually executes it.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install fonts
      # canvas.py already searches /usr/share/fonts/truetype/dejavu; this
      # makes the dependency explicit rather than relying on the runner image.
      run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run the test suite
      run: python -m pytest -q tests
